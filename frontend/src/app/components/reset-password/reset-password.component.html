<div class="split-screen">
  <div class="left-pane">
    <div class="brand-content">
      <h1 class="logo-text">The Auction House</h1>
      <hr class="gold-divider">
      <p class="tagline">Where extraordinary meets exclusivity.</p>
      <p class="tagline">Discover rare treasures from around the world.</p>
    </div>
  </div>

  <div class="right-pane">
    <div class="form-container">
      <h2>Reset Password</h2>
      <p class="form-subtitle">Join the most exclusive auction platform</p>

      <form (submit)="onSubmit()" class="auth-form">
        <div class="input-group">
          <label>OTP</label>
          <input type="text" [(ngModel)]="otp" name="otp" maxlength="6" placeholder="Enter 6-digit code" required>
        </div>

        <div class="input-group">
          <label>New Password</label>
          <div class="password-wrapper">
            <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="newPassword" name="password" required
              placeholder="New Password">
            <i class="far" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'" (click)="togglePassword()"></i>
          </div>
        </div>

        <div class="input-group">
          <label>Confirm Password</label>
          <div class="password-wrapper">
            <input [type]="showConfirmPassword ? 'text' : 'password'" [(ngModel)]="confirmPassword"
              name="confirmPassword" required placeholder="••••••••"> <i class="far"
              [ngClass]="showConfirmPassword ? 'fa-eye-slash' : 'fa-eye'" (click)="toggleConfirmPassword()"></i>
          </div>
        </div>

        <button type="submit" class="btn-reset">Reset Password</button>
      </form>
      <p class="login-redirect">
        Remember Your Password? <a routerLink="/login">Sign In</a>
      </p>
    </div>
  </div>
</div>
